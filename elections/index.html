<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>בחירות</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to bottom,#f0f4f8,#d6eaf8);
text-align:center;
margin:0;
padding:40px;
}

h1{
color:#1d3557;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#00bcd4;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0097a7;
}

.poll-card{
background:white;
padding:20px;
margin:20px auto;
max-width:350px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.candidate{
background:#e0f7fa;
padding:10px;
margin:6px;
border-radius:8px;
cursor:pointer;
}

.candidate:hover{
background:#b2ebf2;
}

</style>
</head>

<body>

<h1>בחירות</h1>

<h3>הכנס קוד קלפי או קוד ניהול</h3>

<input id="pollCode" placeholder="קוד קלפי">
<input id="adminCodeInput" placeholder="קוד ניהול">
<br>
<button onclick="openPoll()">פתח קלפי</button>

<div id="pollArea"></div>

<script>

let polls = JSON.parse(localStorage.getItem("polls")) || {

"5V":{
name:"יועץ חברתי",
open:true,
candidates:["איתן","נועם","מאיה","תמר"],
votes:{}
}

};

let adminCode = localStorage.getItem("adminCode") || "ADMIN123";

function openPoll(){

const pollCode = document.getElementById("pollCode").value;
const adminInput = document.getElementById("adminCodeInput").value;

if(adminInput === adminCode){

window.location.href="admin.html";
return;

}

if(!polls[pollCode]){
alert("קוד קלפי שגוי");
return;
}

const poll = polls[pollCode];

if(!poll.open){
alert("הקלפי סגורה");
return;
}

renderPoll(pollCode);

}

function renderPoll(code){

const poll = polls[code];

const div = document.getElementById("pollArea");

div.innerHTML="";

const card = document.createElement("div");
card.className="poll-card";

card.innerHTML=`<h2>${poll.name}</h2>`;

poll.candidates.forEach(c=>{

const el=document.createElement("div");

el.className="candidate";

el.innerText=c;

el.onclick=()=>vote(code,c);

card.appendChild(el);

});

div.appendChild(card);

}

function vote(pollCode,candidate){

let voted = localStorage.getItem("voted_"+pollCode);

if(voted){
alert("כבר הצבעת!");
return;
}

polls[pollCode].votes[candidate]=(polls[pollCode].votes[candidate]||0)+1;

localStorage.setItem("polls",JSON.stringify(polls));

localStorage.setItem("voted_"+pollCode,true);

alert("ההצבעה נשמרה");

location.reload();

}

</script>

</body>
</html>
