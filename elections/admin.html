<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>ניהול בחירות</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to bottom,#f0f4f8,#d6eaf8);
text-align:center;
padding:40px;
}

button{
padding:10px 16px;
margin:5px;
border:none;
border-radius:8px;
background:#00bcd4;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0097a7;
}

input{
padding:8px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

.poll-card{
background:white;
padding:15px;
margin:15px auto;
max-width:350px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h1>עמוד מנהל</h1>

<h2>יצירת קלפי חדשה</h2>

<input id="pollName" placeholder="שם הקלפי">

<input id="candidates" placeholder="מועמדים (מופרדים בפסיק)">

<button onclick="createPoll()">צור קלפי</button>

<hr>

<div id="pollList"></div>

<script>

let polls = JSON.parse(localStorage.getItem("polls")) || {};

function randomCode(){

return Math.random().toString(36).substring(2,5).toUpperCase();

}

function createPoll(){

const name=document.getElementById("pollName").value;

const candidates=document.getElementById("candidates").value.split(",");

if(!name || candidates.length==0){

alert("צריך שם ומועמדים");

return;

}

let code=randomCode();

polls[code]={

name:name,

open:true,

candidates:candidates,

votes:{}

};

localStorage.setItem("polls",JSON.stringify(polls));

alert("נוצרה קלפי עם קוד: "+code);

render();

}

function render(){

const container=document.getElementById("pollList");

container.innerHTML="";

for(const code in polls){

const poll=polls[code];

const card=document.createElement("div");

card.className="poll-card";

card.innerHTML=`

<h3>${poll.name} (${code})</h3>

<p>מצב: ${poll.open ? "פתוח" : "סגור"}</p>

<button onclick="toggle('${code}')">פתח / סגור</button>

<button onclick="resetVotes('${code}')">אפס הצבעות</button>

<button onclick="showResults('${code}')">ראה תוצאות</button>

`;

container.appendChild(card);

}

}

function toggle(code){

polls[code].open=!polls[code].open;

localStorage.setItem("polls",JSON.stringify(polls));

render();

}

function resetVotes(code){

polls[code].votes={};

localStorage.setItem("polls",JSON.stringify(polls));

alert("הקלפי אופסה");

}

function showResults(code){

let results="";

const votes=polls[code].votes;

for(const c in votes){

results+=c+" : "+votes[c]+"\n";

}

if(results==="") results="אין הצבעות";

alert(results);

}

render();

</script>

</body>
</html>
