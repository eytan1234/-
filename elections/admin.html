<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>ניהול בחירות</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(to bottom,#f0f4f8,#d6eaf8);
text-align:center;
padding:40px;
}

input{
padding:8px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 16px;
margin:5px;
border:none;
border-radius:8px;
background:#00bcd4;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0097a7;
}

.poll-card{
background:white;
padding:15px;
margin:15px auto;
max-width:400px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h1>עמוד מנהל</h1>

<h2>יצירת קלפי</h2>

<input id="pollName" placeholder="שם קלפי">

<input id="candidates" placeholder="מועמדים (פסיקים)">

<input id="voterCount" type="number" placeholder="מספר מצביעים">

<button onclick="createPoll()">צור קלפי</button>

<hr>

<h2>שינוי קוד מנהל</h2>

<input id="newAdminCode" placeholder="קוד מנהל חדש">

<button onclick="changeAdminCode()">שנה קוד</button>

<hr>

<div id="pollList"></div>

<canvas id="chart"></canvas>

<script>

let polls = JSON.parse(localStorage.getItem("polls")) || {};

function randomCode(){

return Math.random().toString(36).substring(2,8).toUpperCase();

}

function createPoll(){

const name=document.getElementById("pollName").value;

const candidates=document.getElementById("candidates").value.split(",");

const count=parseInt(document.getElementById("voterCount").value);

const pollCode=randomCode();

let codes=[];

for(let i=0;i<count;i++){

codes.push(randomCode());

}

polls[pollCode]={

name:name,

candidates:candidates,

votes:{},

codes:codes,

usedCodes:[]

};

localStorage.setItem("polls",JSON.stringify(polls));

alert("קוד קלפי: "+pollCode);

render();

}

function changeAdminCode(){

const newCode=document.getElementById("newAdminCode").value;

localStorage.setItem("adminCode",newCode);

alert("קוד המנהל השתנה");

}

function render(){

const container=document.getElementById("pollList");

container.innerHTML="";

for(const code in polls){

const poll=polls[code];

const card=document.createElement("div");

card.className="poll-card";

card.innerHTML=`

<h3>${poll.name}</h3>

<p>קוד קלפי: ${code}</p>

<button onclick="showCodes('${code}')">קודי הצבעה</button>

<button onclick="showResults('${code}')">גרף תוצאות</button>

`;

container.appendChild(card);

}

}

function showCodes(code){

alert(polls[code].codes.join("\n"));

}

function showResults(code){

const poll=polls[code];

const labels=[];

const data=[];

for(const c of poll.candidates){

labels.push(c);

data.push(poll.votes[c]||0);

}

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:labels,
datasets:[{label:"תוצאות",data:data}]
}

});

}

render();

</script>

</body>
</html>
